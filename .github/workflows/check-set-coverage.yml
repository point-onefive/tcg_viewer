name: Check set coverage

# Weekly check that the site's set lists (src/lib/sets-*.json) still cover every
# set published upstream. If anything new is detected (or upstream fetch fails),
# we open or update a tracking issue. No code changes are made automatically.
#
# Schedule: Mondays 09:00 UTC. Manual dispatch supported.
#
# Required repository secrets:
#   POKEMONTCG_API_KEY  — pokemontcg.io v2 API key (lifts daily rate limit)

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: check-set-coverage
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
      ISSUE_TITLE: 'Set coverage: new upstream sets detected'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run coverage check
        id: check
        run: |
          set +e
          node scripts/check-set-coverage.mjs --markdown > report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat report.md
          {
            echo 'report<<__REPORT_EOF__'
            cat report.md
            echo '__REPORT_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.check.outputs.report }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              process.env.REPORT || '_no report captured_',
              '',
              '---',
              `Detected by [${context.workflow}](${runUrl}) on ${new Date().toISOString()}.`,
              '',
              'To add new sets: run the relevant `scripts/fetch-*-data.mjs` + `scripts/generate-*-data.mjs` (or trigger the **Refresh card collections** workflow) and merge the resulting JSON updates.',
              'If the entry is a promo/non-set bucket we don\'t intend to ingest, add it to the `ignoreCodes` / `ignoreNames` list in `scripts/check-set-coverage.mjs`.',
            ].join('\n')

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'set-coverage',
              per_page: 50,
            })
            const match = existing.find((i) => i.title === title)

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body,
              })
              core.notice(`Updated existing issue #${match.number}`)
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['set-coverage'],
              })
              core.notice(`Opened issue #${created.number}`)
            }

      - name: Close tracking issue when clean
        if: steps.check.outputs.exit_code == '0'
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: ${{ env.ISSUE_TITLE }}
        with:
          script: |
            const title = process.env.ISSUE_TITLE
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'set-coverage',
              per_page: 50,
            })
            const match = existing.find((i) => i.title === title)
            if (!match) return
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: 'All upstream sets are now accounted for. Closing.',
            })
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
            })
