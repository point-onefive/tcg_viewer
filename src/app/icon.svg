  <rect x="9" y="4" width="14" height="22" rx="2.5" fill="#2a2a2a" stroke="#E85D2A" stroke-width="1" transform="rotate(-4 16 15)"/>
  <rect x="9" y="4" width="14" height="22" rx="2.5" fill="#E85D2A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="11" y="7" width="10" height="14" rx="1" fill="#1a1a1a" opacity="0.9"/>
